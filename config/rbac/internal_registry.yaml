# ==============================================================================
# OpenShift Internal Registry RBAC Allowances
# 
# NEED FOR THIS MANIFEST:
# By default, OpenShift strictly secures its internal image registry. When doing 
# local development and pushing a custom image (like 'coraza-operator:dev') 
# directly to the internal registry, the cluster needs explicit permissions to 
# pull and run that image.
#
# ==============================================================================


apiVersion: v1
kind: List
items:
- apiVersion: rbac.authorization.k8s.io/v1
  kind: RoleBinding
  metadata:
    name: image-puller
    # Namespace is injected dynamically by the oc command
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: system:image-puller
  subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:unauthenticated
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:serviceaccounts
- apiVersion: rbac.authorization.k8s.io/v1
  kind: RoleBinding
  metadata:
    name: image-pusher
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: system:image-builder
  subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:unauthenticated