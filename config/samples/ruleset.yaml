apiVersion: waf.k8s.coraza.io/v1alpha1
kind: RuleSource
metadata:
  name: base-rules
spec:
  rules: |
    SecRuleEngine On
    SecRequestBodyAccess On
    SecResponseBodyAccess Off
    SecAuditLog /dev/stdout
    SecAuditLogFormat JSON
    SecAuditEngine RelevantOnly
---
apiVersion: waf.k8s.coraza.io/v1alpha1
kind: RuleSource
metadata:
  name: sqli-rules
spec:
  rules: |
    SecRule ARGS "@rx (?i:(\b(select|union|insert|update|delete|drop|create|alter|exec|execute)\b.*\b(from|into|where|table|database|procedure)\b)|(\b(or|and)\b\s*['\"]?\d+['\"]?\s*=\s*['\"]?\d+)|('.*or.*'.*=.*'))" \
      "id:1001,\
      phase:2,\
      block,\
      t:none,t:urlDecodeUni,\
      msg:'SQL Injection Attack Detected',\
      logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
      tag:'application-multi',\
      tag:'language-multi',\
      tag:'platform-multi',\
      tag:'attack-sqli',\
      severity:'CRITICAL'"
---
apiVersion: waf.k8s.coraza.io/v1alpha1
kind: RuleSource
metadata:
  name: xss-rules
spec:
  rules: |
    SecRule ARGS "@rx (?i:<script[^>]*>.*?</script>|javascript:|onerror\s*=|onload\s*=|<iframe)" \
      "id:2001,\
      phase:2,\
      block,\
      t:none,t:urlDecodeUni,t:htmlEntityDecode,\
      msg:'XSS Attack Detected',\
      logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
      tag:'application-multi',\
      tag:'language-multi',\
      tag:'platform-multi',\
      tag:'attack-xss',\
      severity:'CRITICAL'"
---
apiVersion: waf.k8s.coraza.io/v1alpha1
kind: RuleSource
metadata:
  name: no-evil-monkeys
spec:
  rules: |
    SecRule ARGS|REQUEST_URI|REQUEST_HEADERS "@contains evilmonkey" \
      "id:3001,\
      phase:2,\
      deny,\
      status:403,\
      t:none,t:urlDecodeUni,\
      msg:'Evil Monkey Detected',\
      logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
      tag:'application-multi',\
      tag:'language-multi',\
      tag:'platform-multi',\
      tag:'monkey-attack',\
      severity:'CRITICAL'"
---
apiVersion: waf.k8s.coraza.io/v1alpha1
kind: RuleSource
metadata:
  name: no-evil-data
spec:
  rules: |
    SecRule ARGS|REQUEST_URI|REQUEST_HEADERS "@pmFromFile some.data" \
      "id:3002,\
      phase:2,\
      deny,\
      status:403,\
      t:none,t:urlDecodeUni,\
      msg:'Evil Monkey Detected',\
      logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
      tag:'application-multi',\
      tag:'language-multi',\
      tag:'platform-multi',\
      tag:'monkey-attack',\
      severity:'CRITICAL'"
---
apiVersion: waf.k8s.coraza.io/v1alpha1
kind: RuleData
metadata:
  name: datafile
spec:
  files:
    some.data: |
      evildata
      anotherevildata
---
apiVersion: waf.k8s.coraza.io/v1alpha1
kind: RuleSet
metadata:
  name: default-ruleset
spec:
  sources:
    - name: base-rules
    - name: sqli-rules
    - name: xss-rules
    - name: no-evil-monkeys
    - name: no-evil-data
  data:
    - name: datafile
