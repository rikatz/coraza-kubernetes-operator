apiVersion: waf.k8s.coraza.io/v1alpha1
kind: Engine
metadata:
  name: coraza
spec:
  ruleSet:
    name: default-ruleset
  failurePolicy: fail
  driver:
    istio:
      wasm:
        image: "oci://ghcr.io/networking-incubator/coraza-proxy-wasm:08fb3dd7229b6bf9211bf15e4d4f4f54b7dbda49"
        mode: gateway
        workloadSelector:
          matchLabels:
            gateway.networking.k8s.io/gateway-name: coraza-gateway
        ruleSetCacheServer:
          pollIntervalSeconds: 5
