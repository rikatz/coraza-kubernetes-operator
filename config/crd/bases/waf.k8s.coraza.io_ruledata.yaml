---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: ruledata.waf.k8s.coraza.io
spec:
  group: waf.k8s.coraza.io
  names:
    kind: RuleData
    listKind: RuleDataList
    plural: ruledata
    singular: ruledata
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RuleData holds data file content (e.g. for @pmFromFile) for consumption by
          RuleSet resources. Each entry in spec.files maps a filename to its content.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the data file content.
            properties:
              files:
                additionalProperties:
                  type: string
                description: files maps filenames to file content, used for @pmFromFile
                  data.
                minProperties: 1
                type: object
            required:
            - files
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: files must be non-empty
          rule: has(self.spec.files) && size(self.spec.files) > 0
        - message: files keys must be valid data file names (alphanumeric, '-', '_',
            '.'; max 253 chars)
          rule: 'has(self.spec.files) ? self.spec.files.all(k, k.matches(''^[-._a-zA-Z0-9]+$'')
            && size(k) <= 253) : true'
    served: true
    storage: true
    subresources: {}
