version: 2
updates:
  # Dependencies listed in go.mod
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/test/conformance"
      - "/tools/github_project_manager"
      - "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Canada/Eastern"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      all-updates:
        patterns:
          - "*"

  # Dependencies listed in Dockerfile
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Canada/Eastern"
    open-pull-requests-limit: 10
    labels:
      - docker
      - dependencies
    commit-message:
      prefix: "deps"
      include: "scope"

  # npm dependencies for the documentation build (PostCSS toolchain)
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Canada/Eastern"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      all-updates:
        patterns:
          - "*"

  #  Github actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Canada/Eastern"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-updates:
        patterns:
          - "*"
