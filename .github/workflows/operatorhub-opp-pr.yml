# Path-filtered OPP (kiwi) run: validates bundle shape against community-operator
# checks using a fixed public controller image (not the PR’s unreleased digest).
name: operatorhub-opp-pr

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/coraza-kubernetes-operator/**"
      - "hack/generate_bundle.py"
      - "hack/operatorhub_opp_test.sh"
      - "bundle/**"
      - "config/crd/**"
      - "Makefile"

jobs:
  opp-kiwi:
    name: OPP kiwi (bundle)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: verify go module integrity
        run: go mod verify

      - name: set up helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: install python dependencies
        run: |
          pip install PyYAML==6.0.3 ansible==8.7.0 jmespath==1.0.1
          if [[ -f hack/requirements.txt ]]; then pip install -r hack/requirements.txt; fi

      - name: generate bundle and run OPP
        run: make bundle.opp
        env:
          VERSION: v0.0.${{ github.run_number }}
          CONTROLLER_MANAGER_CONTAINER_IMAGE: ghcr.io/networking-incubator/coraza-kubernetes-operator:latest

      - name: print OPP logs on failure
        if: failure()
        run: |
          cat /tmp/test.out 2>/dev/null || true
          echo "--------------------------------------------------------------------------"
          cat /tmp/op-test/log.out 2>/dev/null || true
          if [[ -d /tmp/op-test ]]; then
            find /tmp/op-test -maxdepth 3 -type f \( -name '*.log' -o -name '*.out' \) -print 2>/dev/null | head -40 || true
          fi
