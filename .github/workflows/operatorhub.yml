name: operatorhub

permissions: read-all

on:
  release:
    types: [published]

jobs:
  publish-operatorhub:
    name: submit bundle to community-operators
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Disabled until a dedicated bot/service account can own OPERATORHUB_TOKEN
    # and related repo configuration. Submit bundles manually; see RELEASE.md
    # Step 6. TODO: https://github.com/networking-incubator/coraza-kubernetes-operator/issues/201
    if: false
    # When re-enabled: skip prereleases (v0.x are prereleases in release.yml).
    # if: ${{ !github.event.release.prerelease }}
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: set up helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          cat << 'EOF' > /tmp/operatorhub-requirements.txt
          PyYAML==6.0.2
          ansible==8.7.0
          jmespath==1.0.1
          EOF
          python -m pip install -r /tmp/operatorhub-requirements.txt
          if [[ -f hack/requirements.txt ]]; then python -m pip install -r hack/requirements.txt; fi

      - name: extract version
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "bare=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: generate OLM bundle
        env:
          TAG: ${{ github.event.release.tag_name }}
          CONTROLLER_MANAGER_CONTAINER_IMAGE: ghcr.io/networking-incubator/coraza-kubernetes-operator:${{ github.event.release.tag_name }}
        run: make bundle VERSION="$TAG"

      - name: OPP bundle test (kiwi)
        run: ./hack/operatorhub_opp_test.sh --version "${STEPS_VERSION_OUTPUTS_BARE}"
        env:
          STEPS_VERSION_OUTPUTS_BARE: ${{ steps.version.outputs.bare }}

      - name: print OPP logs on failure
        if: failure()
        run: |
          cat /tmp/test.out 2>/dev/null || true
          echo "--------------------------------------------------------------------------"
          cat /tmp/op-test/log.out 2>/dev/null || true
          if [[ -d /tmp/op-test ]]; then
            find /tmp/op-test -maxdepth 3 -type f \( -name '*.log' -o -name '*.out' \) -print 2>/dev/null | head -40 || true
          fi

      - name: configure git credentials for GitHub HTTPS
        env:
          GH_TOKEN: ${{ secrets.OPERATORHUB_TOKEN }}
        run: gh auth setup-git

      - name: submit to community-operators
        env:
          GITHUB_TOKEN: ${{ secrets.OPERATORHUB_TOKEN }}
          GIT_USER: ${{ vars.OPERATORHUB_GIT_USER }}
          GIT_EMAIL: ${{ vars.OPERATORHUB_GIT_EMAIL }}
          STEPS_VERSION_OUTPUTS_BARE: ${{ steps.version.outputs.bare }}
          VARS_OPERATORHUB_FORK_OWNER: ${{ vars.OPERATORHUB_FORK_OWNER }}
        run: |
          hack/publish_operatorhub.sh \
            --version "${STEPS_VERSION_OUTPUTS_BARE}" \
            --fork "${VARS_OPERATORHUB_FORK_OWNER}"
