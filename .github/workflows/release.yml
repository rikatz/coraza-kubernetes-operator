name: release

permissions: read-all

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  prepare:
    name: check release tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    steps:
      - name: validate version tag format
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.?[0-9]+)?$ ]]; then
            echo "::error::Invalid version tag format: $GITHUB_REF_NAME"
            exit 1
          fi

      - name: determine if pre-release
        id: prerelease
        run: |
          # Check if version matches pre-release patterns:
          # - v0.x.x (any 0.x version is considered pre-release)
          # - vX.Y.Z-alpha.N, vX.Y.Z-beta.N, vX.Y.Z-rc.N
          if [[ "$GITHUB_REF_NAME" =~ ^v0\. ]] || [[ "$GITHUB_REF_NAME" =~ -(alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release: $GITHUB_REF_NAME"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a stable release: $GITHUB_REF_NAME"
          fi

  build-manifests:
    name: build manifests
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: build manifest bundles # crds.yaml, operator.yaml, samples.yaml
        run: make release.manifests
        env:
          VERSION: ${{ github.ref_name }}

      - name: upload manifest artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: manifests
          path: dist/

  build-push-image:
    name: build and push container image
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: networking-incubator/coraza-kubernetes-operator
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-dev
          platforms: linux/amd64

  publish-release:
    name: publish github release
    runs-on: ubuntu-latest
    needs: [prepare, build-manifests, build-push-image]
    permissions:
      contents: write
    steps:
      - name: download manifest artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: manifests
          path: dist/

      - name: create github release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true # IMPORTANT: our releases are immutable, so a maintainer needs to validate and do the final publish
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            dist/crds.yaml
            dist/operator.yaml
            dist/samples.yaml
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
