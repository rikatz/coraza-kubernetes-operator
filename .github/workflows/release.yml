name: release

permissions: read-all

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  prepare:
    name: check release tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    steps:
      - name: validate version tag format
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.?[0-9]+)?$ ]]; then
            echo "::error::Invalid version tag format: $GITHUB_REF_NAME"
            exit 1
          fi

      - name: determine if pre-release
        id: prerelease
        run: |
          # Check if version matches pre-release patterns:
          # - v0.x.x (any 0.x version is considered pre-release)
          # - vX.Y.Z-alpha.N, vX.Y.Z-beta.N, vX.Y.Z-rc.N
          if [[ "$GITHUB_REF_NAME" =~ ^v0\. ]] || [[ "$GITHUB_REF_NAME" =~ -(alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release: $GITHUB_REF_NAME"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a stable release: $GITHUB_REF_NAME"
          fi

  build-manifests:
    name: build manifests
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: set up helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v4.1.3"

      - name: build manifest bundles
        run: make release.manifests release.kubectl-plugin
        env:
          VERSION: ${{ github.ref_name }}

      - name: upload manifest artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: manifests
          path: dist/

  build-push-image:
    name: build and push container image
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      digest: ${{ steps.push-image.outputs.digest }}
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: networking-incubator/coraza-kubernetes-operator
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push image
        id: push-image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          platforms: linux/amd64

  build-push-bundle:
    name: build and push bundle image
    if: false # TODO: https://github.com/networking-incubator/coraza-kubernetes-operator/issues/187
    runs-on: ubuntu-latest
    needs: [prepare, build-push-image]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: networking-incubator/coraza-kubernetes-operator
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.12"

      - name: install python dependencies
        run: pip install PyYAML==6.0.3

      - name: set up helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v4.1.3"

      - name: set up docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: generate bundle
        run: make bundle
        env:
          VERSION: ${{ github.ref_name }}
          CONTROLLER_MANAGER_CONTAINER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push-image.outputs.digest }}

      - name: build and push bundle image
        run: make bundle.build bundle.push
        env:
          VERSION: ${{ github.ref_name }}

  build-push-catalog:
    name: build and push catalog image
    if: false # TODO: https://github.com/networking-incubator/coraza-kubernetes-operator/issues/187
    runs-on: ubuntu-latest
    needs: [build-push-bundle]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: networking-incubator/coraza-kubernetes-operator
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.12"

      - name: install python dependencies
        run: pip install PyYAML==6.0.3

      - name: set up docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: update catalog with new version
        run: make catalog.update
        env:
          VERSION: ${{ github.ref_name }}

      - name: build and push catalog image
        run: make catalog.build catalog.push
        env:
          VERSION: ${{ github.ref_name }}

  publish-release:
    name: publish github release
    runs-on: ubuntu-latest
    needs: [prepare, build-manifests, build-push-image]
    permissions:
      contents: write
    steps:
      - name: download manifest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: manifests
          path: dist/

      - name: create github release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true # IMPORTANT: our releases are immutable, so a maintainer needs to validate and do the final publish
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            dist/crds.yaml
            dist/operator.yaml
            dist/samples.yaml
            dist/*.tgz
            dist/kubectl-coraza-linux-amd64
            dist/kubectl-coraza-linux-arm64
            dist/kubectl-coraza-darwin-amd64
            dist/kubectl-coraza-darwin-arm64
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
