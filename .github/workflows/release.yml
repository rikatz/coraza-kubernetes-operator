name: release

permissions:
  contents: read

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  prepare:
    name: check release tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    steps:
      - name: validate version tag format
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.?[0-9]+)?$ ]]; then
            echo "::error::Invalid version tag format: $GITHUB_REF_NAME"
            exit 1
          fi

      - name: determine if pre-release
        id: prerelease
        run: |
          # Check if version matches pre-release patterns:
          # - v0.x.x (any 0.x version is considered pre-release)
          # - vX.Y.Z-alpha.N, vX.Y.Z-beta.N, vX.Y.Z-rc.N
          if [[ "$GITHUB_REF_NAME" =~ ^v0\. ]] || [[ "$GITHUB_REF_NAME" =~ -(alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release: $GITHUB_REF_NAME"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a stable release: $GITHUB_REF_NAME"
          fi

  build-manifests:
    name: build manifests
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: verify go module integrity
        run: go mod verify

      - name: set up helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v4.1.3"

      - name: build manifest bundles
        run: make release.manifests release.kubectl-plugin
        env:
          VERSION: ${{ github.ref_name }}

      - name: upload manifest artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifests
          path: dist/

  build-push-image:
    name: build and push container image
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      digest: ${{ steps.push-image.outputs.digest }}
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: networking-incubator/coraza-kubernetes-operator
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to ghcr
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push image
        id: push-image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          platforms: linux/amd64

  build-push-bundle:
    name: build and push bundle image
    if: false # TODO: https://github.com/networking-incubator/coraza-kubernetes-operator/issues/187
    runs-on: ubuntu-latest
    needs: [prepare, build-push-image]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: networking-incubator/coraza-kubernetes-operator
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: verify go module integrity
        run: go mod verify

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.12"

      - name: install python dependencies
        run: pip install PyYAML==6.0.3

      - name: set up helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v4.1.3"

      - name: set up docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to ghcr
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: generate bundle
        run: make bundle
        env:
          VERSION: ${{ github.ref_name }}
          CONTROLLER_MANAGER_CONTAINER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push-image.outputs.digest }}

      - name: build and push bundle image
        run: make bundle.build bundle.push
        env:
          VERSION: ${{ github.ref_name }}

  build-push-catalog:
    name: build and push catalog image
    if: false # TODO: https://github.com/networking-incubator/coraza-kubernetes-operator/issues/187
    runs-on: ubuntu-latest
    needs: [build-push-bundle]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: networking-incubator/coraza-kubernetes-operator
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.12"

      - name: install python dependencies
        run: pip install PyYAML==6.0.3

      - name: set up docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to ghcr
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: update catalog with new version
        run: make catalog.update
        env:
          VERSION: ${{ github.ref_name }}

      - name: build and push catalog image
        run: make catalog.build catalog.push
        env:
          VERSION: ${{ github.ref_name }}

  publish-release:
    name: publish github release
    runs-on: ubuntu-latest
    needs: [prepare, build-manifests, build-push-image]
    permissions:
      contents: write
    steps:
      - name: download manifest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: manifests
          path: dist/

      # IMPORTANT: draft release — a maintainer must validate and publish manually.
      # The chart .tgz is included here (not in a separate chart-releaser step)
      # so that pages.yml can generate the Helm repo index directly from release
      # assets using `cr index`, without needing a dedicated gh-pages branch.
      - name: create github release
        run: |
          # Idempotency: if a draft release already exists for this tag (e.g.
          # from a previous partial run), delete it so we can recreate cleanly.
          # Refuse to overwrite a published release.
          RELEASE_STATE=$(gh release view "${TAG}" --json isDraft --jq '.isDraft' 2>/dev/null || echo "none")
          if [ "${RELEASE_STATE}" = "true" ]; then
            echo "Deleting existing draft release for ${TAG} (re-run detected)"
            gh release delete "${TAG}" --yes
          elif [ "${RELEASE_STATE}" = "false" ]; then
            echo "::error::A published release already exists for ${TAG}. Cannot overwrite."
            exit 1
          fi

          # Expand the chart .tgz glob into concrete filenames.
          CHART_TGZ=(dist/coraza-kubernetes-operator-*.tgz)
          if [ ! -f "${CHART_TGZ[0]}" ]; then
            echo "::error::No chart .tgz found in dist/"
            exit 1
          fi

          ASSETS=(
            dist/crds.yaml
            dist/operator.yaml
            dist/samples.yaml
            "${CHART_TGZ[@]}"
            dist/kubectl-coraza-linux-amd64
            dist/kubectl-coraza-linux-arm64
            dist/kubectl-coraza-darwin-amd64
            dist/kubectl-coraza-darwin-arm64
          )

          for f in "${ASSETS[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Required release asset not found: ${f}"
              exit 1
            fi
          done

          PRERELEASE_FLAG=""
          if [ "${IS_PRERELEASE}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${TAG}" \
            --draft \
            --title "${TAG}" \
            --generate-notes \
            ${PRERELEASE_FLAG} \
            "${ASSETS[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}

  # Redeploy GitHub Pages so the Helm repo index picks up the newly published
  # chart .tgz from this release. pages.yml downloads all chart assets from
  # GitHub releases and regenerates index.yaml on every run.
  #
  # NOTE: publish-release creates a draft. pages.yml excludes drafts (their
  # assets aren't publicly downloadable), so this run won't include the new
  # chart yet. The index updates once the release is manually published —
  # any push to main or manual workflow_dispatch will pick it up.
  trigger-pages:
    name: trigger pages deployment
    runs-on: ubuntu-latest
    needs: [publish-release]
    permissions:
      actions: write
    steps:
      - name: trigger pages deployment
        run: gh workflow run pages.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
