name: pages

permissions: read-all

on:
  push:
    branches: [main]
  workflow_dispatch: # called by release.yml after a new chart is published

concurrency:
  group: pages
  cancel-in-progress: false # never cancel a pages deployment mid-flight

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: build docs
        run: make docs.build

      # chart-releaser (cr) CLI is used instead of helm/chart-releaser-action because
      # the action has no "index-only" mode — it always tries to upload chart packages
      # and push index.yaml to a git branch, neither of which we want here.
      - name: install chart-releaser
        run: |
          set -o pipefail
          CR_VERSION="1.8.1"
          CR_ARCHIVE="chart-releaser_${CR_VERSION}_linux_amd64.tar.gz"
          CR_BASE_URL="https://github.com/helm/chart-releaser/releases/download/v${CR_VERSION}"
          curl -fsSLo "${CR_ARCHIVE}" "${CR_BASE_URL}/${CR_ARCHIVE}"
          curl -fsSLo checksums.txt "${CR_BASE_URL}/checksums.txt"
          grep -q "  ${CR_ARCHIVE}$" checksums.txt || { echo "::error::checksum entry not found for ${CR_ARCHIVE}"; exit 1; }
          grep "  ${CR_ARCHIVE}$" checksums.txt | sha256sum -c -
          tar -xzf "${CR_ARCHIVE}" cr
          install -d "${RUNNER_TEMP}/cr-bin"
          install cr "${RUNNER_TEMP}/cr-bin/cr"
          echo "${RUNNER_TEMP}/cr-bin" >> "${GITHUB_PATH}"
          rm "${CR_ARCHIVE}" checksums.txt cr

      # cr index does NOT enumerate GitHub releases on its own — it requires local
      # .tgz packages to know which chart versions exist, then looks up the matching
      # GitHub release for each one to extract download URLs.
      # Drafts are excluded because their assets are not publicly downloadable,
      # which would produce broken URLs in index.yaml. The index updates once
      # the release is published and pages.yml is triggered again (push to main
      # or manual dispatch). Uses paginated API to avoid missing releases when
      # the repo has more than 100.
      - name: download chart packages from releases
        run: |
          set -euo pipefail
          mkdir -p .cr-release-packages
          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" \
            --jq '.[] | select(.draft == false) | .tag_name' > /tmp/release-tags.txt
          while read -r tag; do
            # Exit code 1 with "no assets" is expected for releases without
            # a chart .tgz (e.g. early releases). Real errors (auth, network)
            # produce different exit codes or messages and must not be masked.
            if ! gh release download "$tag" --pattern '*.tgz' --dir .cr-release-packages --skip-existing 2>/tmp/dl-err.txt; then
              if grep -q "no assets match" /tmp/dl-err.txt 2>/dev/null; then
                echo "No chart package in release ${tag}, skipping."
              else
                echo "::error::Failed to download from release ${tag}:"
                cat /tmp/dl-err.txt
                exit 1
              fi
            fi
          done < /tmp/release-tags.txt
          echo "Downloaded chart packages:"
          ls -la .cr-release-packages/ || echo "  (none — first deployment)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # cr index reads each local .tgz, extracts chart metadata, and looks up the
      # matching GitHub release by tag to get asset download URLs for index.yaml.
      #
      # --release-name-template is required because our releases use "v0.1.0" tags,
      # but the default template is "{{ .Name }}-{{ .Version }}" which would look for
      # "coraza-kubernetes-operator-0.1.0" — a tag that does not exist.
      #
      # --charts-repo is intentionally omitted: it is deprecated in cr and has no
      # effect. The index URLs always come from the GitHub release asset's
      # BrowserDownloadURL, pointing users directly to GitHub Releases for downloads.
      # cr index loads the previous index from origin/gh-pages to merge entries.
      # This deployment uses actions/deploy-pages (artifact-based), which never
      # creates a gh-pages branch, so we create an empty local ref to satisfy cr.
      - name: stub gh-pages ref for cr index
        run: |
          export GIT_AUTHOR_NAME="github-actions[bot]"
          export GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          export GIT_COMMITTER_NAME="github-actions[bot]"
          export GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            echo "refs/remotes/origin/gh-pages already exists; using fetched history."
          else
            EMPTY_TREE=$(git mktree < /dev/null)
            EMPTY_COMMIT=$(git commit-tree "$EMPTY_TREE" -m "stub")
            git update-ref refs/remotes/origin/gh-pages "$EMPTY_COMMIT"
          fi

      - name: generate helm repo index
        run: |
          cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --release-name-template "v{{ .Version }}" \
            --package-path .cr-release-packages \
            --index-path docs/public/index.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: configure pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/public

  deploy:
    name: deploy to github pages
    runs-on: ubuntu-latest
    needs: build
    # id-token: write is required for OIDC-based authentication with GitHub Pages.
    # pages: write allows the deployment. These are set at job level (not workflow
    # level) so the build job runs with read-only permissions.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
