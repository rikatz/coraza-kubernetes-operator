name: pages

permissions: read-all

on:
  push:
    branches: [main]
  workflow_dispatch: # called by release.yml after a new chart is published

concurrency:
  group: pages
  cancel-in-progress: false # never cancel a pages deployment mid-flight

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: build docs
        run: make docs.build

      # chart-releaser (cr) CLI is used instead of helm/chart-releaser-action because
      # the action has no "index-only" mode — it always tries to upload chart packages
      # and push index.yaml to a git branch, neither of which we want here.
      - name: install chart-releaser
        run: |
          CR_VERSION="1.7.0"
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v${CR_VERSION}/chart-releaser_${CR_VERSION}_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz cr
          mv cr /usr/local/bin/cr
          rm cr.tar.gz

      # cr index does NOT enumerate GitHub releases on its own — it requires local
      # .tgz packages to know which chart versions exist, then looks up the matching
      # GitHub release for each one to extract download URLs.
      - name: download chart packages from releases
        run: |
          mkdir -p .cr-release-packages
          gh release list --limit 100 --json tagName --jq '.[].tagName' | while read -r tag; do
            gh release download "$tag" --pattern '*.tgz' --dir .cr-release-packages --skip-existing 2>/dev/null || true
          done
          echo "Downloaded chart packages:"
          ls -la .cr-release-packages/ || echo "  (none — first deployment)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # cr index reads each local .tgz, extracts chart metadata, and looks up the
      # matching GitHub release by tag to get asset download URLs for index.yaml.
      #
      # --release-name-template is required because our releases use "v0.1.0" tags,
      # but the default template is "{{ .Name }}-{{ .Version }}" which would look for
      # "coraza-kubernetes-operator-0.1.0" — a tag that does not exist.
      #
      # --charts-repo is intentionally omitted: it is deprecated in cr and has no
      # effect. The index URLs always come from the GitHub release asset's
      # BrowserDownloadURL, pointing users directly to GitHub Releases for downloads.
      - name: generate helm repo index
        run: |
          cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${GITHUB_REPOSITORY#*/}" \
            --release-name-template "v{{ .Version }}" \
            --package-path .cr-release-packages \
            --index-path docs/public/index.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: configure pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/public

  deploy:
    name: deploy to github pages
    runs-on: ubuntu-latest
    needs: build
    # id-token: write is required for OIDC-based authentication with GitHub Pages.
    # pages: write allows the deployment. These are set at job level (not workflow
    # level) so the build job runs with read-only permissions.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
