name: build-test

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    name: build and generate
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: verify go module integrity
        run: go mod verify

      - name: build and generate manifests
        run: make build helm.sync

      - name: check for uncommitted changes
        run: git diff --exit-code || (echo "generated files have uncommitted changes. run 'make manifests generate helm.sync' and commit the results." && exit 1)

      - name: build container image
        run: make build.image

      - name: save container image
        run: docker save "${CONTROLLER_MANAGER_IMAGE}" -o /tmp/controller-image.tar
        env:
          CONTROLLER_MANAGER_IMAGE: ghcr.io/networking-incubator/coraza-kubernetes-operator:v0.0.0-dev

      - name: upload container image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: controller-image
          path: /tmp/controller-image.tar
          retention-days: 1

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: verify go module integrity
        run: go mod verify

      - name: run linter
        run: make lint

      - name: run api linter
        run: make lint.api


  bundle-validate:
    name: bundle validate
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.12"
      - name: install python dependencies
        run: pip install PyYAML==6.0.3
      - name: set up helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v4.1.3"
      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
      - name: verify go module integrity
        run: go mod verify
      - name: generate and validate bundle
        run: |
          make bundle
          make operator-sdk
          ./bin/operator-sdk bundle validate ./bundle

  chart-lint:
    name: chart-lint
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.12"
      - name: set up helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v4.1.3"
      - name: set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: run chart-testing (lint)
        run: ct lint --config .ct.yaml --all

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: verify go module integrity
        run: go mod verify

      - name: run unit tests with coverage
        run: make test.coverage

      - name: upload coverage to codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out

  tools-tests:
    name: tools tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "tools/github_project_manager/go.mod"

      - name: verify go module integrity
        run: cd tools/github_project_manager && go mod verify

      - name: run tools tests
        run: make test.tools

  conformance-tests:
    name: Coreruleset conformance test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: verify go module integrity
        run: go mod verify

      - name: download container image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: controller-image
          path: /tmp

      - name: load container image
        run: docker load -i /tmp/controller-image.tar

      - name: install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: "v1.35.3"

      - name: install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v4.1.3"

      - name: install kind
        run: go install sigs.k8s.io/kind@a323333ff9efd8099f95a8a6b5c86c75a210d00f # v0.31.0

      - name: setup environment
        run: make cluster.kind
        env:
          KIND_CLUSTER_NAME: coraza-kubernetes-operator-integration
          SKIP_IMAGE_BUILD: "true"

      - name: run Conformance tests
        run: |
          make test.conformance
        env:
          KIND_CLUSTER_NAME: coraza-kubernetes-operator-integration
          CONFORMANCE_EXTRA_FLAGS: OUTPUT_FORMAT=github

  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: verify go module integrity
        run: go mod verify

      - name: download container image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: controller-image
          path: /tmp

      - name: load container image
        run: docker load -i /tmp/controller-image.tar

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.12"

      - name: install python dependencies
        run: pip install PyYAML==6.0.3

      - name: install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: "v1.35.3"

      - name: install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v4.1.3"

      - name: install kind
        run: go install sigs.k8s.io/kind@a323333ff9efd8099f95a8a6b5c86c75a210d00f # v0.31.0

      - name: set up kind cluster
        run: make cluster.kind
        env:
          SKIP_IMAGE_BUILD: "true"

      - name: run integration tests
        run: make test.integration
        env:
          KIND_CLUSTER_NAME: coraza-kubernetes-operator-integration

      - name: collect logs on failure
        if: failure()
        run: |
          echo "Collecting istiod logs..."
          kubectl logs -n istio-system -l app=istiod > istiod.log || echo "Failed to collect istiod logs"
          echo "Collecting envoy/ingress gateway logs..."
          kubectl logs -n istio-system -l app=istio-ingressgateway > envoy.log || echo "Failed to collect envoy logs"
          echo "Collecting controller manager logs..."
          kubectl logs -n coraza-system -l control-plane=coraza-controller-manager > controller.log || echo "Failed to collect controller logs"
          echo "Collecting cluster info..."
          kubectl cluster-info dump --output-directory=cluster-dump --namespaces=istio-system,coraza-system,default || echo "Failed to collect cluster dump"

      - name: upload debug logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-logs
          path: |
            istiod.log
            envoy.log
            controller.log
            cluster-dump/

      - name: clean up kind cluster
        if: always()
        run: kind delete cluster --name coraza-kubernetes-operator-integration || true
