image:
  repository: ghcr.io/networking-incubator/coraza-kubernetes-operator
  tag: latest
  pullPolicy: IfNotPresent

# NOTE: HA Presently Not Supported:
#  https://github.com/networking-incubator/coraza-kubernetes-operator/issues/38
replicas: 1

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 128Mi


metrics:
  enabled: true
  # TODO: Enable secure metrics with auth once ServiceMonitor is configured for authn/authz
  # https://github.com/networking-incubator/coraza-kubernetes-operator/issues/88
  serviceMonitor:
    enabled: false

tls:
  # Validity period for the CA certificate (Go duration format).
  # Must be at least 168h (1 week).
  caValidity: "43800h"  # 5 years

  # Validity period for the cache server certificate (Go duration format).
  # Must be at least 24h (1 day).
  serverCertValidity: "720h"  # 30 days

istio:
  # When empty, the operator does not set an Istio revision label on managed resources.
  revision: ""

openshift:
  enabled: false

createNamespace: true

podSecurityStandard:
  version: latest  # v1.35

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
imagePullSecrets: []

resizePolicy:
  - resourceName: cpu
    restartPolicy: NotRequired
  - resourceName: memory
    restartPolicy: NotRequired
