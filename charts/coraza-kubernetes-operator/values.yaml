image:
  repository: ghcr.io/networking-incubator/coraza-kubernetes-operator
  tag: latest
  pullPolicy: IfNotPresent

# NOTE: HA Presently Not Supported:
#  https://github.com/networking-incubator/coraza-kubernetes-operator/issues/38
replicas: 1

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 128Mi


metrics:
  enabled: true
  # Name of an existing Secret containing TLS certificate and key for the metrics endpoint.
  # When empty, controller-runtime generates a self-signed certificate automatically.
  certSecret: ""
  # Key names inside the certSecret (defaults: tls.crt, tls.key).
  certName: "tls.crt"
  keyName: "tls.key"
  # If the secret also contains a CA certificate, set caName so the ServiceMonitor
  # can verify the metrics endpoint instead of using insecureSkipVerify.
  caName: ""
  serviceMonitor:
    enabled: false

logging:
  # When true, uses console encoder with debug level (development mode).
  # When false (default), uses JSON encoder with info level (production mode).
  development: false

istio:
  # When empty, the operator does not set an Istio revision label on managed resources.
  revision: ""

# Default WASM plugin OCI URL when an Engine omits spec.driver.istio.wasm.image.
# When empty, the operator's built-in default (internal/defaults.DefaultCorazaWasmOCIReference) is used.
defaultWasmImage: ""

openshift:
  enabled: false

createNamespace: true

podSecurityStandard:
  version: latest  # v1.35

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
imagePullSecrets: []

resizePolicy:
  - resourceName: cpu
    restartPolicy: NotRequired
  - resourceName: memory
    restartPolicy: NotRequired
