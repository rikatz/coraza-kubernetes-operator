apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "coraza-operator.fullname" . }}-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coraza-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "coraza-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.metrics.enabled }}
    - ports:
        - port: 8443
          protocol: TCP
    {{- end }}
