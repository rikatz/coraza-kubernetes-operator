version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    staticcheck:
      checks:
        - "all"
        - "-SA1019" # Disable deprecated warnings
        - "-QF1008" # Disable warnings for embedded field selector
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
        path: internal/*
      - linters:
          - gosec
          - bodyclose
          - noctx
        path: _test\.go
      - linters:
          - gosec
          - noctx
        path: test/
      - linters:
          - gosec
        path: tools/
      - linters:
          - revive
        path: internal/rulesets/memfs/
        text: "exported:"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/networking-incubator/coraza-kubernetes-operator
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
